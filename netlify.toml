# Netlify configuration for Ad-Genie (Next.js 14 App Router)
# Netlify auto-detects Next.js and applies @netlify/plugin-nextjs automatically —
# API routes, Server Components, and Edge Functions all work without any static export.

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

# ── Edge / serverless function timeouts ──────────────────────────────────────
# Poster generation via OpenAI gpt-image-1 can take up to 15 s.
# Netlify's default is 10 s on the free tier; bump to 26 s on paid plans.
[functions]
  # Background functions are available on Pro+ plans.
  # Standard timeout on Free is 10 s — upgrade to Pro for 26 s.
  node_bundler = "esbuild"

# ── Headers ──────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(self), camera=(), microphone=()"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ────────────────────────────────────────────────────────────────
# Next.js handles its own routing; this catch-all lets it do so.
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200

# ── Environment variable declarations ────────────────────────────────────────
# Values are set in: Netlify dashboard → Site → Environment variables
# (never commit real values to this file)
#
# Required:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   OPENAI_API_KEY
#   NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
#   RAKUTEN_API_KEY
#   RAKUTEN_PUBLISHER_ID
#
# Optional (Sentry — leave blank to disable error tracking):
#   NEXT_PUBLIC_SENTRY_DSN
#   SENTRY_DSN
#   SENTRY_ORG
#   SENTRY_PROJECT
#   SENTRY_AUTH_TOKEN
